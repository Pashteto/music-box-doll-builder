# nginx vhost alternative (use if ports 80/443 are already owned by nginx/aaPanel
# on oracle-2). Drop into the server's sites/vhost dir, then obtain TLS with:
#   sudo certbot --nginx -d lindentar.pashteto.com

server {
    listen 80;
    listen [::]:80;
    server_name lindentar.pashteto.com;

    root /srv/lindentar/out;
    index index.html;

    # Clean URLs from the static export (/editor/ -> /editor/index.html).
    location / {
        try_files $uri $uri/ /404.html;
    }

    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml model/gltf-binary;
}
